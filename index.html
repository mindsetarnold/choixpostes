<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Choix de postes</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
body { font-family: DM Sans, sans-serif; margin:0; background:#f4f2ed; color:#1a1510; }
.page { max-width:900px; margin:auto; padding:20px; }

.card { background:white; padding:16px; border-radius:12px; margin-bottom:12px; }
h1 { font-size:20px; }

select, button {
  padding:8px;
  margin:5px 0;
  width:100%;
}

button { cursor:pointer; }
.row { display:grid; grid-template-columns:40px 1fr; gap:10px; align-items:center; margin-bottom:8px; }

.badge { font-size:12px; padding:2px 6px; background:#ddd; border-radius:6px; }
.alert { background:#ffe5e5; padding:10px; margin:10px 0; border-radius:8px; color:#8b2020; }

table { width:100%; border-collapse:collapse; margin-top:10px; }
td, th { border-bottom:1px solid #ddd; padding:6px; font-size:13px; }
</style>
</head>

<body>

<div class="page">

<h1>Choix de postes</h1>

<div class="card">
  <label>Élève</label>
  <select id="student" onchange="loadForm()"></select>

  <div id="form"></div>
  <button onclick="save()">Enregistrer</button>
  <div id="status"></div>
</div>

<div class="card">
  <h3>Vœux</h3>
  <table id="table"></table>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "xxx.firebaseapp.com",
  databaseURL: "https://xxx-default-rtdb.firebaseio.com",
  projectId: "xxx"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [];
let posts = [];
let choices = [];

const NB_VOEUX = 5;

/* ───────── DATA ───────── */

db.ref("students").on("value", s=>{
  students = Object.values(s.val()||{});
  renderStudents();
});

db.ref("posts").on("value", p=>{
  posts = Object.values(p.val()||{});
});

db.ref("choices").on("value", c=>{
  choices = Object.values(c.val()||{});
  renderTable();
});

/* ───────── UI ───────── */

function renderStudents(){
  const sel = document.getElementById("student");
  sel.innerHTML = '<option value="">-- choisir --</option>';
  students.forEach(s=>{
    let o=document.createElement("option");
    o.value=s.rank;
    o.textContent=s.rank+" - "+s.name;
    sel.appendChild(o);
  });
}

function loadForm(){
  const rank = +document.getElementById("student").value;
  const container = document.getElementById("form");
  if(!rank){ container.innerHTML=""; return; }

  const c = choices.find(x=>x.rank===rank)||{};

  let html = "";
  for(let i=1;i<=NB_VOEUX;i++){
    html += `
      <div class="row">
        <div>V${i}</div>
        <select id="v${i}"></select>
      </div>
    `;
  }

  container.innerHTML = html;

  refreshOptions(rank, c);
}

/* ───────── LOGIQUE CASCADE ───────── */

function getSelected(rank, upTo){
  const c = choices.find(x=>x.rank===rank);
  if(!c) return new Set();
  const s=new Set();
  for(let i=1;i<=upTo;i++){
    if(c["v"+i]) s.add(c["v"+i]);
  }
  return s;
}

function refreshOptions(rank, existing){

  for(let i=1;i<=NB_VOEUX;i++){
    const sel = document.getElementById("v"+i);
    sel.innerHTML = '<option value="">-- choix --</option>';

    const already = getSelected(rank, i-1);

    posts.forEach(p=>{
      if(already.has(p.id)) return;

      let o=document.createElement("option");
      o.value=p.id;
      o.textContent=p.name;
      sel.appendChild(o);
    });

    if(existing && existing["v"+i]){
      sel.value = existing["v"+i];
    }
  }
}

/* ───────── SAVE ───────── */

function save(){
  const rank = +document.getElementById("student").value;
  if(!rank) return;

  const entry = { rank, ts: Date.now() };

  for(let i=1;i<=NB_VOEUX;i++){
    entry["v"+i] = document.getElementById("v"+i).value || "";
  }

  db.ref("choices/"+rank).set(entry);

  document.getElementById("status").textContent="Enregistré ✔";
  setTimeout(()=>document.getElementById("status").textContent="",2000);
}

/* ───────── TABLE ───────── */

function postName(id){
  return posts.find(p=>p.id===id)?.name || "";
}

function renderTable(){
  let html = "<tr><th>Rang</th><th>Nom</th><th>V1</th><th>V2</th><th>V3</th><th>V4</th><th>V5</th></tr>";

  choices.forEach(c=>{
    html += "<tr>";
    html += "<td>"+c.rank+"</td>";
    html += "<td>"+c.name+"</td>";

    for(let i=1;i<=NB_VOEUX;i++){
      html += "<td>"+postName(c["v"+i])+"</td>";
    }

    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
}

</script>

</body>
</html>
